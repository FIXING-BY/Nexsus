<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Qono Protection</title>
    <style>
        :root {
            --bg: #030303;
            --accent: #ffffff;
            --font: 'Inter', system-ui, sans-serif;
        }

        body {
            margin: 0;
            background: var(--bg);
            /* Ultra Modern Noktalı Arkaplan */
            background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: var(--font);
            user-select: none;
            overflow: hidden;
        }

        /* Ana Panel Tasarımı */
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 60px 40px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            max-width: 320px;
            width: 85%;
            transition: 0.5s ease;
        }

        /* Modern Yükleme Çizgisi */
        .loader {
            width: 100px;
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 30px auto;
            position: relative;
            overflow: hidden;
        }

        .loader::after {
            content: '';
            display: block;
            width: 30px;
            height: 100%;
            background: #fff;
            position: absolute;
            animation: move 2s infinite linear;
            box-shadow: 0 0 15px #fff;
        }

        @keyframes move {
            0% { left: -40px; }
            100% { left: 110px; }
        }

        .sys-id {
            font-size: 9px;
            letter-spacing: 5px;
            color: rgba(255,255,255,0.3);
            margin-top: 20px;
            font-weight: 300;
        }

        #b { display: none; }

        /* --- SAĞ ALT QONO SECURE (SABİT VE RENK DEĞİŞTİREN) --- */
        .qono-brand {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10000;
            mix-blend-mode: difference; /* Arkaplana göre renk değiştirme */
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qono-brand span {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #fff; /* difference moduyla zıtlaşır */
            font-family: var(--font);
        }

        .qono-indicator {
            width: 4px;
            height: 4px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff;
        }
    </style>
</head>
<body oncontextmenu="return false">

    <div id="l" class="glass-card">
        <div style="font-weight: 200; font-size: 14px; letter-spacing: 2px;">GÜVENLİ BAĞLANTI</div>
        <div class="loader"></div>
        <div id="i" class="sys-id">LOADING</div>
    </div>

    <div id="b" class="glass-card" style="border-color: rgba(255,0,0,0.2)">
        <div style="font-size: 32px; margin-bottom: 20px;">🔒</div>
        <div style="font-weight: 700; color: #ff4444; margin-bottom: 10px; letter-spacing: 1px;">ERİŞİM KISITLANDI</div>
        <div id="d" style="font-size: 9px; opacity: 0.4; margin-bottom: 20px;"></div>
        <p style="font-size: 11px; opacity: 0.6; line-height: 1.8;">Sistem kaynakları Qono Secure tarafından koruma altına alınmıştır.</p>
    </div>

    <div class="qono-brand">
        <div class="qono-indicator"></div>
        <span>Qono Secure</span>
    </div>

    <script>
        (function(){
            const _storage = localStorage;
            let _uid = _storage.getItem('q_uid');
            if(!_uid){
                _uid = 'QN-' + Math.random().toString(36).substr(2, 6).toUpperCase();
                _storage.setItem('q_uid', _uid);
            }
            document.getElementById('i').innerText = _uid;

            const _trigger = () => {
                document.getElementById('l').style.display = 'none';
                document.getElementById('d').innerText = `ID: ${_uid}`;
                document.getElementById('b').style.display = 'block';
                throw 'SECURE_STOP';
            };

            // Kısayol Koruması
            window.addEventListener('keydown', (e) => {
                // F12, Ctrl+U, Ctrl+Shift+I/J
                if (e.keyCode === 123 || (e.ctrlKey && (e.keyCode === 85 || (e.shiftKey && (e.keyCode === 73 || e.keyCode === 74))))) {
                    e.preventDefault();
                    _trigger();
                }
            });

            document.addEventListener('contextmenu', e => e.preventDefault());
        })();
    </script>
</body>
</html>
